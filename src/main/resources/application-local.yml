# Local 프로파일 설정 (개발자 로컬 환경 - H2 인메모리 DB)
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
        show_sql: false
    defer-datasource-initialization: true

  batch:
    job:
      enabled: false                # 앱 시작 시 자동 실행 끔 (데이터 초기화보다 먼저 실행되는 문제 방지)
    jdbc:
      initialize-schema: embedded   # H2에서 배치 메타 테이블 자동 생성

  # ── Day 17: Redis 연결 설정 (로컬 IDE 실행 시) ─────────────────────────────
  # IDE에서 앱을 직접 실행할 때는 Compose 네트워크 밖이므로 host = localhost 사용.
  # docker compose로 Redis만 먼저 띄운 뒤 앱은 IDE에서 실행하는 "패턴 B" 도 동일하다.
  #
  # [참고] docker-compose.yml 의 Redis 서비스가 6379 포트를 호스트에 열어 두므로
  #        IDE에서 localhost:6379 로 접근할 수 있다.
  #
  # [spring.redis.* vs spring.data.redis.*]
  # Spring Boot 3.2 부터 spring.redis.* 는 완전 deprecated 되었다.
  # IDE에서 컴파일 경고가 발생하며, 향후 버전에서 제거 예정이다.
  # 신규 코드에서는 반드시 spring.data.redis.* 만 사용한다.
  data:
    redis:
      host: localhost   # 로컬 IDE → localhost / Compose 내부 앱 → redis (서비스명)
      port: 6379
      lettuce:
        pool:
          # Lettuce 기본 설정은 커넥션 풀이 '비활성화' 상태다.
          # commons-pool2 의존성 추가 + 아래 설정이 있어야 풀이 활성화된다.
          # 고부하 환경에서 풀 없이 배포하면 연결 불안정 장애가 나므로 로컬부터 습관화한다.
          max-active: 8   # 동시에 사용할 수 있는 최대 커넥션 수
          max-idle: 8     # 풀에 유지할 최대 유휴 커넥션 수
          min-idle: 1     # 항상 유지할 최소 유휴 커넥션 수 (워밍업 효과)

logging:
  level:
    root: info
    com:
      example:
        instagramclone: debug
    org:
      hibernate:
        SQL: debug
        type:
          descriptor:
            sql: trace
