<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STOMP Ping-Pong Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h2>STOMP Ping-Pong 테스트</h2>
    <button onclick="connect()">1. 연결</button>
    <button onclick="subscribe()">2. 구독</button>
    <button onclick="sendPing()">3. Ping 보내기</button>
    <button onclick="disconnect()">4. 연결 끊기</button>
    <hr>
    <div id="log" style="white-space: pre-wrap; font-family: monospace;"></div>

    <script>
        let stompClient = null;

        function log(msg) {
            document.getElementById('log').innerHTML += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
        }

        function connect() {
            const socket = new SockJS('http://localhost:8090/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function(frame) {
                log('[OK] STOMP 연결 성공! ' + frame);
            }, function(error) {
                log('[ERROR] 연결 실패: ' + error);
            });
        }

        function subscribe() {
            if (!stompClient) { log('[WARN] 먼저 연결하세요!'); return; }

            stompClient.subscribe('/topic/pong', function(message) {
                const body = JSON.parse(message.body);
                log('[RECV] PONG 수신: ' + JSON.stringify(body));
            });
            log('[OK] /topic/pong 구독 완료');
        }

        function sendPing() {
            if (!stompClient) { log('[WARN] 먼저 연결하세요!'); return; }

            const payload = JSON.stringify({ message: 'Hello STOMP!' });
            stompClient.send('/app/ping', {}, payload);
            log('[SEND] PING 전송: ' + payload);
        }

        function disconnect() {
            if (stompClient) {
                stompClient.disconnect(function() {
                    log('[OK] 연결 종료');
                });
            }
        }
    </script>
</body>
</html>
