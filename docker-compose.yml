version: '3.8'

# ================================================================
# Day 17 - Redis + Spring Boot 통합 실행 환경
#
# [사용법]
#   전체 기동  : docker compose up -d --build
#   상태 확인  : docker compose ps
#   로그 확인  : docker compose logs -f app          (8090 인스턴스)
#                docker compose logs -f app-8091     (8091 인스턴스)
#   종료       : docker compose down
#   볼륨까지 삭제: docker compose down -v
#
# [세 가지 실행 패턴]
#   패턴 A - Compose 풀 스택 + 단일 앱: redis + mysql + app(8090)
#   패턴 B - redis/mysql 만 Compose, app 은 IDE 에서 직접 실행
#             → SPRING_PROFILES_ACTIVE=local 로 두면 Redis host = localhost
#   패턴 C - Day 24 멀티 서버 검증: redis + mysql + app(8090) + app-8091(8091)
#             두 인스턴스가 같은 mysql + 같은 redis 를 공유한다.
#             브라우저는 호스트의 8090/8091 로 분리 접근 → STOMP user destination
#             resolution 이 서버별로 어떻게 동작하는지를 진짜로 검증할 수 있다.
#
# [패턴 C 주의]
#   - 8090(app)이 스키마/데이터 초기화를 단독 담당, 8091(app-8091)은 init 모두 비활성화.
#     동시에 ddl-auto=create 로 부팅하면 MySQL InnoDB Deadlock 이 터진다.
#     아래 app-8091 의 환경변수 (DDL_AUTO=validate, BATCH_INITIALIZE=never,
#     SQL_INIT_MODE=never) 가 그 분리를 강제한다. 직접 수정하지 말 것.
#   - JWT_SECRET_KEY 는 두 인스턴스 모두 같은 값이어야 한 인스턴스에서 발급한
#     토큰을 다른 인스턴스가 검증할 수 있다. .env 파일로 공유.
#   - app-8091 이 첫 부팅에서 "schema not found" 로 실패할 수 있다 (app 의
#     스키마 생성이 아직 안 끝난 시점). restart: on-failure 가 자동 재시도하므로
#     30~60초 안에 안정화된다. docker compose ps 로 확인.
#
# ================================================================

services:

  # ── MySQL 서버 (Day 20 벤치마크 시연용) ──────────────────────────
  mysql:
    image: mysql:8.0
    container_name: instagram-clone-mysql
    ports:
      - "3307:3306"
    environment:
      TZ: Asia/Seoul                         # 컨테이너 OS 시각을 KST 로
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: instagram
      MYSQL_USER: instagram
      MYSQL_PASSWORD: instagram
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis 서버 ────────────────────────────────────────────────
  redis:
    image: redis:8-alpine          # 2026년 기준 최신 안정판 (캐시 기능은 버전 무관)
    container_name: instagram-clone-redis
    ports:
      - "6379:6379"                # 호스트:컨테이너 - IntelliJ에서도 localhost:6379 로 접근 가능
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]   # PONG 이 오면 healthy
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot 앱 (패턴 A/C 풀스택 시 사용) ───────────────────
  # 패턴 B에서는 이 서비스를 주석 처리하고 앱은 IDE에서 기동한다.
  app:
    build:
      context: .
      dockerfile: Dockerfile       # 프로젝트 루트의 Dockerfile 참조
    image: instagram-clone-app:latest   # app-8091 이 같은 이미지를 재사용하도록 명시
    container_name: instagram-clone-app
    ports:
      - "8090:8090"
    environment:
      # Compose 네트워크 안에서는 서비스 이름(redis)이 곧 호스트명이다.
      # IDE에서 직접 실행할 때와 달리 localhost가 아니라 redis로 지정해야 한다.
      - TZ=Asia/Seoul                        # JVM 기본 타임존을 KST 로 (@CreatedDate 기준 시각)
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis   # application-docker.yml 의 ${SPRING_DATA_REDIS_HOST}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      mysql:
        condition: service_healthy     # MySQL 이 ready 상태일 때까지 앱 기동 대기
      redis:
        condition: service_healthy     # Redis 가 PONG 응답할 때까지 앱 기동 대기
    volumes:
      # 업로드 파일을 컨테이너 밖(호스트)에 보관해 재시작 시에도 유지된다.
      - ${HOME}/instagram-clone/uploads:/root/instagram-clone/uploads

  # ── Spring Boot 앱 두 번째 인스턴스 (패턴 C: Day 24 멀티 서버 검증) ──
  # app 서비스와 동일한 이미지를 8091 포트로 띄운다.
  # 같은 도커 네트워크 안에서 같은 redis (서비스명 redis), 같은 mysql 을 공유.
  # 브라우저는 호스트의 localhost:8091 로 직접 접근 — Sticky session 은 자동
  # (브라우저가 어느 포트로 연결했냐에 따라 그 컨테이너로 고정된다).
  #
  # 멀티 서버 검증이 필요 없을 때는 이 서비스를 주석 처리해도 된다.
  #
  # ⚠ 스키마/데이터 초기화 분리 (필수)
  # ─────────────────────────────────────────────────────────────
  # 두 컨테이너가 동시에 ddl-auto=create 로 부팅하면 MySQL 테이블에
  # DROP/CREATE 락을 서로 잡아 InnoDB Deadlock 이 터진다. 데이터 시드
  # (sql/ddl.sql), Spring Batch 메타 테이블 INSERT 도 마찬가지.
  #
  # 해결: 8090(app) 단독으로 스키마+데이터 초기화 책임. 8091 은 모든 init 비활성화.
  # 첫 부팅 순서가 어긋나도 restart: on-failure 로 자동 복구.
  app-8091:
    image: instagram-clone-app:latest   # app 의 빌드 결과를 그대로 재사용
    container_name: instagram-clone-app-8091
    ports:
      - "8091:8091"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SERVER_PORT=8091              # 컨테이너 내부에서도 8091 listen
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      # ── 스키마/데이터 초기화 비활성화 (app 인스턴스가 단독 담당) ──
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate           # app 이 만든 스키마 검증만
      - SPRING_BATCH_JDBC_INITIALIZE_SCHEMA=never        # 배치 메타 테이블 두 번 만들지 않음
      - SPRING_SQL_INIT_MODE=never                       # data.sql / ddl.sql 시드 두 번 실행 방지
    depends_on:
      app:
        condition: service_started    # app 의 빌드 산출물(image)을 재사용하므로 빌드 선행 보장
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 첫 부팅 시 app 의 스키마 준비가 아직 안 끝났을 수 있다 (validate 가 schema 없음으로 실패).
    # on-failure 로 재시작하면 app 이 schema 만든 뒤 두 번째 시도에서 성공.
    restart: on-failure
    volumes:
      # 두 인스턴스가 같은 업로드 디렉터리를 공유 — 어느 쪽에서 업로드해도 양쪽에서 서빙됨
      - ${HOME}/instagram-clone/uploads:/root/instagram-clone/uploads

volumes:
  mysql-data:
